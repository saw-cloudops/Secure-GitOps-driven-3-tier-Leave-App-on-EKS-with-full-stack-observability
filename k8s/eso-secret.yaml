apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secrets-eso
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: db-secrets # This creates the actual K8s Secret named 'db-secrets'
    creationPolicy: Owner
  data:
  # Map AWS Secret keys to K8s Secret keys
  - secretKey: root-password
    remoteRef:
      key: prod/leave-system/db
      property: password # Using main password for root for simplicity in migration
  - secretKey: db-user
    remoteRef:
      key: prod/leave-system/db
      property: username
  - secretKey: db-password
    remoteRef:
      key: prod/leave-system/db
      property: password
  - secretKey: jwt-secret
    remoteRef:
      key: prod/leave-system/db
      property: jwt_secret
  - secretKey: db-host
    remoteRef:
      key: prod/leave-system/db
      property: host
  - secretKey: db-name
    remoteRef:
      key: prod/leave-system/db
      property: dbname
