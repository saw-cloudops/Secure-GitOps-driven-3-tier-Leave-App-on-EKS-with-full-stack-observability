loki:
  auth_enabled: false
  # S3 Configuration for EKS (using IRSA)
  storage:
    type: s3
    bucketNames:
      chunks: your-loki-chunks-bucket
      ruler: your-loki-ruler-bucket
      admin: your-loki-admin-bucket
    s3:
      region: us-east-1
      # Leave access key/secret empty when using IRSA
      # s3: s3://us-east-1/your-loki-bucket
  
  serviceAccount:
    create: true
    name: loki-sa
    annotations:
      # REPLACE THIS with your actual IAM Role ARN
      eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/LokiStorageRole"

  schema_config:
    configs:
      - from: 2020-10-24
        store: boltdb-shipper
        object_store: s3
        schema: v11
        index:
          prefix: index_
          period: 24h

promtail:
  # Promtail automatically scrapes K8s pods stdout
  enabled: true
