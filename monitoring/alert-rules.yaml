apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: backend-alerts
  labels:
    release: prometheus
spec:
  groups:
  - name: backend.rules
    rules:
    # 1. High Error Rate (> 5% for 2 minutes)
    - alert: HighErrorRate
      expr: sum(rate(http_request_duration_seconds_count{status_code=~"5.."}[2m])) / sum(rate(http_request_duration_seconds_count[2m])) > 0.05
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Backend High Error Rate detected"
        description: "More than 5% of requests are failing (5xx) for the last 2 minutes."

    # 2. Slow Responses (P95 Latency > 1s for 5 minutes)
    - alert: HighLatency
      expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m]) by (le))) > 1.0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Backend is slow"
        description: "95th percentile latency is > 1 second."

    # 3. Instance Down
    - alert: BackendDown
      expr: up{job="backend-monitor"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Backend is DOWN"
        description: "Prometheus cannot scrape the backend target."
