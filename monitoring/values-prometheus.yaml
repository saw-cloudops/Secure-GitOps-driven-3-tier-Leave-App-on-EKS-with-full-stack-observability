prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    podMonitorSelector: {}
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "gp2"   # your EBS CSI storage class
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi           # adjust size as needed

grafana:
  enabled: true
  adminUser: admin
  adminPassword: admin123
  defaultDashboardsEnabled: false
  persistence:
    enabled: true
    storageClassName: "gp2"     # same EBS storage class
    accessModes:
      - ReadWriteOnce
    size: 2Gi                       # adjust size as needed
  service:
    type: ClusterIP
    port: 80

alertmanager:
  alertmanagerSpec:
    replicas: 1
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: "gp2"
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi           # adjust size as needed

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

prometheusOperator:
  createCustomResource: true
  serviceAccount:
    create: true
