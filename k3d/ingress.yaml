apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: leave-ingress
  namespace: leave-system
  annotations:
    # k3d uses Traefik by default, not ALB
    # These annotations are for Traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - http:
      paths:
      # Route API requests to Backend
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 3000
      # Route everything else to Frontend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
