apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: leave-management-system
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://gitlab.com/YOUR_USERNAME/3tier-leave-system.git' # REPLACE WITH YOUR REPO URL
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
