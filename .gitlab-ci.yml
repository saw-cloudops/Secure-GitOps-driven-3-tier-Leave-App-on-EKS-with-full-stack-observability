image: node:22-alpine

stages:
  - test
  - security
  - build
  - deploy

variables:
  REGISTRY: $CI_REGISTRY
  IMAGE_PREFIX: $CI_REGISTRY_IMAGE

# --- UNIT TESTING STAGE ---
test_backend:
  stage: test
  script:
    - cd backend
    - npm ci
    - npm test -- --coverage

test_frontend:
  stage: test
  script:
    - cd frontend
    - npm ci
    - npm test -- --coverage

# --- SECURITY STAGE (DevSecOps) ---
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml

sast:
  stage: security

secret_detection:
  stage: security

dependency_scanning:
  stage: security

# --- BUILD STAGE ---
build_and_push:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    # Authenticate to GitLab Container Registry
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u "$CI_REGISTRY_USER" --password-stdin
  script:
    # Backend
    - echo "Building Backend..."
    - cd backend
    - docker build -t $REGISTRY/$IMAGE_PREFIX/backend:sha-$CI_COMMIT_SHORT_SHA -t $REGISTRY/$IMAGE_PREFIX/backend:latest .
    - docker push $REGISTRY/$IMAGE_PREFIX/backend:sha-$CI_COMMIT_SHORT_SHA
    - docker push $REGISTRY/$IMAGE_PREFIX/backend:latest
    - cd ..
    
    # Frontend
    - echo "Building Frontend..."
    - cd frontend
    - docker build -t $REGISTRY/$IMAGE_PREFIX/frontend:sha-$CI_COMMIT_SHORT_SHA -t $REGISTRY/$IMAGE_PREFIX/frontend:latest .
    - docker push $REGISTRY/$IMAGE_PREFIX/frontend:sha-$CI_COMMIT_SHORT_SHA
    - docker push $REGISTRY/$IMAGE_PREFIX/frontend:latest
    - cd ..
  only:
    - main
    - master

# --- DEPLOY STAGE ---
update_manifests:
  stage: deploy
  image: bitnami/git:latest
  before_script:
    - git config --global user.email "ci-bot@gitlab.com"
    - git config --global user.name "CI Bot"
  script:
    - git checkout $CI_COMMIT_REF_NAME
    
    # Update Backend Deployment Image
    - sed -i "s|image: .*|image: $REGISTRY/$IMAGE_PREFIX/backend:sha-$CI_COMMIT_SHORT_SHA|g" k8s/backend.yaml
    
    # Update Frontend Deployment Image
    - sed -i "s|image: .*|image: $REGISTRY/$IMAGE_PREFIX/frontend:sha-$CI_COMMIT_SHORT_SHA|g" k8s/frontend.yaml
    
    # Commit and Push
    - git add k8s/backend.yaml k8s/frontend.yaml
    - |
      if git diff --cached --quiet; then
        echo "No changes to commit."
      else
        git commit -m "Update image tags to $CI_COMMIT_SHORT_SHA [skip ci]"
        # Pushing back to the repository using the job token
        git remote set-url origin "https://oauth2:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        git push origin HEAD:$CI_COMMIT_REF_NAME
      fi
  only:
    - main
    - master
