image: node:22-alpine

stages:
  - test
  - security
  - build
  - deploy

variables:
  REGISTRY: $CI_REGISTRY
  IMAGE_PREFIX: $CI_REGISTRY_IMAGE
  # Tag မရှိရင် SHA ကို သုံးဖို့ variable တစ်ခု သတ်မှတ်ထားမယ်
  APP_VERSION: $CI_COMMIT_SHORT_SHA 

# --- UNIT TESTING STAGE ---
test_backend:
  stage: test
  script:
    - cd backend
    - npm ci
    - npm test -- --coverage

test_frontend:
  stage: test
  script:
    - cd frontend
    - npm ci
    - npm test -- --coverage

# --- SECURITY STAGE ---
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml

sast:
  stage: security

secret_detection:
  stage: security

dependency_scanning:
  stage: security

# --- BUILD STAGE ---
build_and_push:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u "$CI_REGISTRY_USER" --password-stdin
  script:
    # Backend
    - echo "Building Backend..."
    - cd backend
    - docker build -t $IMAGE_PREFIX/backend:$APP_VERSION -t $IMAGE_PREFIX/backend:latest .
    - docker push $IMAGE_PREFIX/backend:$APP_VERSION
    - docker push $IMAGE_PREFIX/backend:latest
    - cd ..

    # Frontend
    - echo "Building Frontend..."
    - cd frontend
    - docker build -t $IMAGE_PREFIX/frontend:$APP_VERSION -t $IMAGE_PREFIX/frontend:latest .
    - docker push $IMAGE_PREFIX/frontend:$APP_VERSION
    - docker push $IMAGE_PREFIX/frontend:latest
    - cd ..

# --- DEPLOY STAGE ---
update_manifests:
  stage: deploy
  image: bitnami/git:latest
  before_script:
    - git config --global user.email "ci-bot@gitlab.com"
    - git config --global user.name "CI Bot"
  script:
    - git fetch origin $CI_DEFAULT_BRANCH
    - git checkout -B $CI_DEFAULT_BRANCH origin/$CI_DEFAULT_BRANCH

    # Update Backend Deployment Image (SHA version ကို သုံးမယ်)
    - "sed -i 's|image: .*backend:.*|image: '$IMAGE_PREFIX'/backend:'$APP_VERSION'|g' k8s/backend.yaml"

    # Update Frontend Deployment Image
    - "sed -i 's|image: .*frontend:.*|image: '$IMAGE_PREFIX'/frontend:'$APP_VERSION'|g' k8s/frontend.yaml"

    # Commit and Push
    - git add k8s/backend.yaml k8s/frontend.yaml
    - |
      if git diff --cached --quiet; then
        echo "No changes to commit."
      else
        git commit -m "Update image tags to $APP_VERSION [skip ci]"
        git remote set-url origin "https://oauth2:${GIT_DEPLOY_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        git push origin HEAD:$CI_DEFAULT_BRANCH
      fi