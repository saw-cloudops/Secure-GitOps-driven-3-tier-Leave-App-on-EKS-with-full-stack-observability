image: node:22-alpine

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - when: never

stages:
  - test
  - security
  - build
  - deploy

variables:
  REGISTRY: $CI_REGISTRY
  IMAGE_PREFIX: $CI_REGISTRY_IMAGE

# --- UNIT TESTING STAGE ---
test_backend:
  stage: test
  script:
    - cd backend
    - npm ci
    - npm test -- --coverage

test_frontend:
  stage: test
  script:
    - cd frontend
    - npm ci
    - npm test -- --coverage

# --- SECURITY STAGE (DevSecOps) ---
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml

sast:
  stage: security

secret_detection:
  stage: security

dependency_scanning:
  stage: security

# --- BUILD STAGE ---
build_and_push:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    # Authenticate to GitLab Container Registry
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u "$CI_REGISTRY_USER" --password-stdin
  script:
    # Backend
    - echo "Building Backend..."
    - cd backend
    - docker build -t $IMAGE_PREFIX/backend:$CI_COMMIT_TAG -t $IMAGE_PREFIX/backend:latest .
    - docker push $IMAGE_PREFIX/backend:$CI_COMMIT_TAG
    - docker push $IMAGE_PREFIX/backend:latest
    - cd ..

    # Frontend
    - echo "Building Frontend..."
    - cd frontend
    - docker build -t $IMAGE_PREFIX/frontend:$CI_COMMIT_TAG -t $IMAGE_PREFIX/frontend:latest .
    - docker push $IMAGE_PREFIX/frontend:$CI_COMMIT_TAG
    - docker push $IMAGE_PREFIX/frontend:latest
    - cd ..
  rules:
    - if: $CI_COMMIT_TAG

# --- DEPLOY STAGE ---
update_manifests:
  stage: deploy
  image: bitnami/git:latest
  before_script:
    - git config --global user.email "ci-bot@gitlab.com"
    - git config --global user.name "CI Bot"
  script:
    - git fetch origin $CI_DEFAULT_BRANCH
    - git checkout -B $CI_DEFAULT_BRANCH origin/$CI_DEFAULT_BRANCH

    # Update Backend Deployment Image
    - 'sed -i "s|image: .*|image: $IMAGE_PREFIX/backend:$CI_COMMIT_TAG|g" k8s/backend.yaml'

    # Update Frontend Deployment Image
    - 'sed -i "s|image: .*|image: $IMAGE_PREFIX/frontend:$CI_COMMIT_TAG|g" k8s/frontend.yaml'

    # Commit and Push
    - git add k8s/backend.yaml k8s/frontend.yaml
    - |
      if git diff --cached --quiet; then
        echo "No changes to commit."
      else
        git commit -m "Update image tags to $CI_COMMIT_TAG [skip ci]"
        # Pushing back to the repository using a Project Access Token
        # NOTE: You MUST create a Project/Personal Access Token with 'write_repository' scope
        # and save it as a CI/CD Variable named GIT_PUSH_TOKEN in Settings > CI/CD > Variables
        git remote set-url origin "https://oauth2:${GIT_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        git push origin HEAD:$CI_DEFAULT_BRANCH
      fi
  rules:
    - if: $CI_COMMIT_TAG
